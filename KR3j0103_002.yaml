body:
  text: 懶真子卷二宋馬永卿撰仁宗皇帝道德如古帝王然禪學亦自高逺僕遊阿育王山見皇祐中所賜大覺禪師懷璉御書五十三卷而偈頌極多內有一頌留懷璉住京師云虛空本無礙智解來作祟山即如如體不落偏中位又有一頌後作一圓相下注兩行云道著喪身失命道不著􅀈􅀈佛性仰窺見解實歷代祖師之上宜乎身居九重道超萬物外則不為姦邪所蔽內則不為聲色所惑而享永年推其緒餘燕及天下昆蟲草木咸受上賜故宸奎閣記云古今通佛法者一人而已至哉言乎本朝宰相銜帶譯經潤文使蓋本於唐也顯慶元年正月玄奘法師在大慈恩寺翻譯西天所得梵本經論時有黃門侍郎薛元超中書侍郎李義府問古來譯儀式如何師答云苻堅時曇摩瞿譯中書侍郎趙整執筆姚興時鳩摩羅什譯安城侯姚嵩執筆後魏時菩提留支譯侍中崔光執筆貞觀中波羅頗那譯左僕射房玄齡趙郡王李孝恭太子詹事杜正倫太府卿蕭璟等監閲今獨無此正月壬辰敕曰大慈恩寺僧玄奘所翻經論既新傳譯文義須精宜令太子太傅尚書左僕射燕國公于志寧中書令來濟禮部尚書許敬宗黃門侍郎薛元超中書侍郎李義府杜正倫時為看閲有不穩當處即隨事潤色之右出藏經三藏法師傳關中隱士駱耕耕道常言修養之士當書月令置坐左右夏至宜節嗜欲冬至宜禁嗜欲蓋一陽初生其氣微矣如草木萌生易於傷伐故當禁之不特節也且嗜欲四時皆損人但冬夏二至隂陽爭之時大損人耳僕曰不獨月令如此唐栁公度年八十有強力人問其術對曰吾平生未嘗以脾胃熟生物暖冷物以元氣佐喜怒此亦可為座右銘也耕道曰然舊説載王禹玉久在翰苑曽有詩云晨光未動曉驂催又向壇頭飲社杯自笑治聾終不是明年強健更重來或曰古人之詩有此意乎僕曰白樂天為忠州刺史九日題塗溪云蕃草席鋪楓岸葉竹枝歌送菊花杯明年尚作南賔守或值重陽更一來亦此意也但古人作詩必有所擬謂之神仙換骨法然非深於此道者亦不能也六一先生作事皆寓深意公生於景德之四年至慶歷五年坐言者論張氏事責知滁州時方年三十九矣未及強仕之年已有醉翁之號其意深矣後韓魏公同在政府六一長魏公一歲魏公諸事頗從之至議推尊濮安懿王同朝俱攻六一故六一遺令託魏公作墓志墓志中盛言初議推尊時乃政府熟議共入文字欲令魏公承當此事以破後世之惑耳或云張氏事雖下六一千百輩人猶且不為至若推尊則遽亡前朝盛德而大違典禮故諸公攻之不少貸也然六一深以此事為然故於五代史義兒傳極致意焉噫人心不同猶其面也此言得之溫公熙寧元豐間嘗往來于陜洛之間從者才三兩人跨驢道上人不知其溫公也每過州縣不使人知一日自洛趨陜時陜守劉仲通諱航元城先生之父也知公之來使人迓之公已從城外過天陽津矣劉遽使以酒四樽遺之公不受來使酷云若不受必重得罪公不得已受兩壺行三十里至張店鎮乃古傅巖故地於鎮官處借人復還之後因於陜之使宅建四公堂謂召公傅公姚公溫公此四公者皆陜中故事也唐姚中令陜之硤石人今陜縣道中路旁有姚氏墓碑徐嶠之書并撰僕少時在高郵學讀送窮文至五鬼相與張眼吐舌跳踉偃仆抵掌頓腳失笑相顧僕不覺大笑時同舍王抃彥法問曰何矧笑至甚為矧僕曰豈退之真見鬼乎彥法曰此乃髑髏之深嚬蹙頞蓋想當然耳且古人作文必有所擬此擬揚子雲逐貧賦也僕後以此言問於舅氏張奉議從聖舅氏曰不然規矩方圓之至也若與規矩合則方圓自然同也若學問至古人自然與古人同不必擬也譬如善射後矢續前矢善馬後足及前足同一理也昨日讀韓文忽憶此話今三十年矣撫卷驚歎者久之詩人之言為用固寡然大有益於世者若長恨歌是也明皇太真之事本有新臺之惡而歌云楊家有女初長成養在深閨人不識故世人罕知其為夀王瑁之妃也春秋為尊者諱此歌真得之諡之曰靈蓋有二義諡法曰德之精明曰靈亂而不損曰靈若周靈王衛靈公是美諡也若楚靈王漢靈帝是惡諡也莊子曰靈公之為靈也久矣此褒之也漢贊之曰靈帝之為靈也優哉此貶之也故曰此一字兼美惡兩諡唐世士大夫崇尚家法栁氏為冠公綽唱之仲郢和之其餘名士亦各修整舊傳栁氏出一婢婢至宿衛韓金吾家未成券聞主翁於廳事上買綾自以手取視之且與駔儈議價婢於窗隙偶見因作中風狀仆地其家怪問之婢云我正以此疾故出栁宅也因出外舍問曰汝有此疾幾何時也婢曰不然我曽伏事栁家郎君豈忍伏事賣絹牙郎也其標韻如此想是栁家家法清高不為塵垢卑賤故婢化之乃至如此雖今士大夫妻有此見識者少矣哀哉聞之於田亘元邈僕友王彥法善談名理嘗謂世人但知韓退之不好佛反不知此老深明此意觀其送髙間上人序云今間師浮屠氏一死生解外膠是其為心必泊然無所起其於世必淡然無所嗜泊與淡相遭頽隨委靡潰敗不可收拾觀此言語乃深得歷代祖師向上休歇一路其所見處大勝裴休且休嘗為圓覺經序考其造詣不及退之逺甚唐士大夫中裴休最號為奉佛退之最號為毁佛兩人所得淺深乃相反如此始知循名失實世間如此者多矣彥法名抃高郵人慕清獻之為人卒於布衣僕今日偶讀圓覺經序因追書之退之感二鳥賦云貞元十五年五月戊辰愈東歸又云讀書著文自七歲至今凡二十二年以文集詳考之是年乃貞元十一年也今按貞元十一年退之年二十八是年三上書宰相不遇而出關故曰自七歲至今凡二十二年至十二年七月從董晉平汴州至十五年二月晉薨退之護喪歸葬洛陽半道聞汴州亂退之既至洛陽徑走彭城省視其家遂復在徐州節度使張建封幕下是年五月作董晉行狀其後書云貞元十五年五月十八日故吏前汴宋亳永等州觀察推官將仕郎祕書省校書郎韓愈狀是時退之年三十二則知作感二鳥賦時貞元十一年明矣但後人誤書十五年也杜牧之華蕚樓詩云千秋佳節名空在承露絲囊世已無唯有紫苔偏稱意年年因得上金鋪金鋪出甘泉賦云排玉户而揚金鋪注云金鋪門首也言風之所至排門揚鋪擊鼓鍰鈕蓋此樓久無人登而苔蘚生其門上矣漢以金盤承露而唐以絲囊絲囊可以承乎此不可解襄鄧之間多隱君子僕嘗記陜州夏縣士人樂舉明逺嘗云二十四氣其名皆可解獨小滿芒種説者不一僕因問之明逺曰皆謂麥也小滿四月中謂麥之氣至此方小滿而未熟也芒種五月節種讀如種類之種謂種之有芒者麥也至是當熟矣僕因記周禮稻人澤草所生種之芒種注云澤草之所生其地可芒種種稻麥也僕近為老農始知過五月節則稻不可種所謂芒種五月節者謂麥至是而始可收稻過是而不可種矣古人名節之意所以告農候之早晚深矣莊子之言有與人意合者今輒記之莊子之言曰地非不廣且大也今之所用容足耳然側足而墊之致黃泉解之者曰墊者掘也地亦大矣人之所用不過容足若使側足之外掘至黃泉則人戰栗不能行矣僕因從而解之曰所以然者以足外無餘地也今有人廉也而人以為貪正也而人以為淫何也以亷正之外無餘地也若云伯夷之亷也栁下惠之正也則人無不信者以有餘地也故曰君子能為可信不能使人之必信人若未信當求之已不可求之人政和中僕為鄧州淅川縣令與順陽主簿張持執權同為金州考試官畢同途而歸至均州界中宿于臨漢江一寺寺前水分兩股行十餘里復合主僧年六十餘極善談論因言股河主僧曰不獨江漢如此天漢亦復如是因取天漢圖相示天漢起於東方經箕尾之間謂之漢津乃分為二道其南道則經傅説星天籥星辨星河鼓星其北道則經龜星南斗魁星左旗下至天津而合為一道故知股河天地皆然也僕曰凡水之行前遇堆阜則左右分流遂如股之狀今天漢乃水象亦有高卑坳平之狀乎其僧笑曰吾不知也後有知星者亦不能答天下之事有一可笑者今輒記之子路在弟子中號為好勇天下之至剛強人也而衛彌子瑕者至以色悅人天下之至柔弱人也然同為友壻故孟子曰彌子之妻與子路之妻兄弟也彌子謂子路曰夫子主我衛卿可得也夷考其時正衛靈公之時何二人賦性之殊也爾雅曰兩壻相謂為亞注云今江東人呼同門為僚壻嚴助傳呼友壻江北人呼連袂又呼連襟壯士感恩起變服不變姓朋友改舊觀僮僕生新敬右孟東野贈韓退之為行軍司馬詩以傳考之非也東野卒於元和九年時退之為史館修撰至元和十二年冬乃以右庶子為彰義軍行軍司馬而東野不及見也前詩乃退之從董晉入汴州為汴州觀察推官時詩也退之年二十五及第四五年不得官至貞元十二年乃為董相從事故有舊觀新敬之語其後為中書舍人左遷右庶子乃為行軍司馬位望隆盛久矣何新敬之説哉曹成王碑句讀差訛説不可解又為人轉易其字故愈不可解僕舊得柴慎微善本今是正之一本云觀察使殘虛使將國良戎界良以武岡叛柴本作初觀察使虛使將國良戎界本無殘字蓋虛使其將國良往戎界故良不往以武岡叛也又一本云披安三縣詠其州斬偽刺史柴本詠字作訹披音鹿非反蓋言披剝安州之三縣故以威名訹懼其州人使斬其不當為刺史者蓋當時刺史李希烈之黨也今之僧尼戒諜云知月黑白大小及結解夏之制皆五印度之法也中國以月晦為一月而天竺以月滿為一月唐西域記云月生至滿謂之白月月虧至晦謂之黑月又其十二月所建各以所直二十八宿名之如中國建寅之類是也故夏三月自四月十六日至五月十五日謂之額沙茶月即鬼宿名也自五月十六日至六月十五日謂之室羅伐拿月即栁星名也自六月十六日至七月十五日謂之婆逹羅鉢陀月即翼星名也黑月或十四日或十五日月有大小故也故中國節氣與印度遞爭半月中國以二十九日為小盡印度以十四日為小盡中國之十六日乃印度之初一日也然結解夏之制宜如西域記用四月十六日蓋四月十五日乃屬道瑟吒月乃印度四月盡日也僕因讀藏經故謾録出之隴石詩云旊大瓶甕小所任各有宜考工記摶埴之工陶旊注云旊讀如甫始之甫鄭元謂旊讀如放音義甫岡切韻略甫兩切與昉同音注云摶埴工以此考之則旊者乃摶埴之工耳非器也而退之乃言旊大瓶甕小者何也考工記旊人為簋實一觳崇直厚半寸脣寸豆實三而成觳崇尺注觳受斗二升豆實四升故云豆實三而成觳然則旊人所作器大者不過能容斗二升小者不過能容四升耳考工記前作陶旊後作旊人當以後為正退之石鼓歌云鐫功勒成告萬世鑿石作鼓隳嵯峨從臣才藝咸第一簡選撰刻留山阿或云此乃退之自况也淮西之碑君相獨委退之故於此見意此説非也元和元年退之自江陵法曹徴為博士時有故人在右輔上言祭酒乞奏朝廷以十橐駝載十石鼓安太學其事不從後六年退之為東都分司郎官及為河南令始為此詩歌中備載此事明甚後元和十二年春退之始被命為淮西碑前歌乃其讖也又云日消月鑠就埋沒而淮西碑亦竟磨滅恐亦讖也曹成王碑云王姓李氏諱臯字子蘭諡曰成其先王明以太宗子國曹又云太支十三曹於弟季或亡或微曹始就事今按曹王明之母楊氏乃齊王元吉之妃也後太宗以明出繼元吉後此人倫之大惡也故退之為國諱既言其先王明以太宗子國曹又云太支十三曹於弟季其言弟季尤有深意蓋元吉之變在於蚤年及其暮年乃有曹王故曰弟季蓋非東昏奴之比也前輩用意皆出忠厚誠可法哉李方叔初名豸從東坡遊東坡曰五經中無公名獨左氏曰庶有豸乎乃音直氏切故後人以為蟲豸之豸又周禮供具絼亦音治乃牛鼻繩也獨玉篇有此豸字非五經不可用今宜易名曰豸方叔遂用之秦少遊見而嘲之曰昔為有腳之豸乎今作無頭之豸乎豸以况狐豸以况箭方叔倉卒無以答之終身以為恨長安慈恩寺塔有唐新進士題名雖妍媸不同然皆高古有法度後人不能及也宣和初本路漕栁瑊集而刻之石亦為竒玩然不載鴈塔本末僕讀藏經因謾記之唐玄奘法師貞觀三年八月往五印度取經至十九年正月復至京師得如來舍利一百五十粒梵本六百五十七部始居洪福寺翻譯至二十二年皇太子治為文德皇后於宫城南晉昌里建太慈恩寺寺成令玄奘居之永徽二年師乃於寺造甎浮屠以藏梵本恐火災也所以謂之鴈塔者用西域故事也王舍城之中有僧婆窣堵波僧婆者唐言鴈也窣堵波者唐言塔也師至王舍城嘗禮是塔因問其因緣云昔此地有伽藍依小乘食三淨食三淨食者謂鴈也犢也鹿也一日衆僧無食仰見羣鴈翔飛輒戲言曰今日衆僧闕供摩薩埵宜知好施謂之薩埵其引前者應聲而墮衆僧欲泣遂依大乘更不食三淨仍建塔以鴈埋其下故師因此名塔先是師先翻瑜珈師地論成進御太宗製大唐三藏聖教序時皇太子治又製述聖記有宏福寺僧懷仁集王右軍字勒二文于碑及鴈塔成禇遂良乃書二帝序記安二碑於塔上其後遂為遊人咸集之地故章八元詩云七層突兀在虛空四十門開面面風却訝烏飛平地上自驚人語半天中回梯暗路如穿洞絶頂初攀似出籠落日鳯城佳氣合滿城春睡雨濛濛此詩人所膾炙然未若少陵之高致也杜詩人所易見此更不録唐人欲作寒食詩欲押餳字以無出處遂不用殊不知出於六經及楚辭也周禮小師掌教簫注云簫編小竹管如今賣飴餳者所吹也管如笛併而吹之招魂曰粔巨籹密餌有餦餭些注云餦餭餳也但戰國時謂之餦餭至後漢時乃謂之餳耳尚書謂之八座其來久矣然學者少究其源或以六曹二丞為八座或以六曹二僕為八座皆非也此事載於晉書職官志其詳今録於左漢光武以三公曹主歲盡考課諸州郡事改常侍曹為吏部曹主選舉祠祀事民曹主繕修功作鹽池園苑事客曹主護駕羌胡朝賀事二千石曹主治地者得一序石刻題云前鄉貢進士韓愈撰乃知作此文時年未三十故能豪放如此今按退之年二十五及第後三試博學宏辭科皆被黜落故曰四舉於禮部乃一得三選於吏部卒無成繼而以鄉貢進士三上書宰相復不遇即出關時年二十八矣且以退之文辭宏放如此而被黜何哉蓋唐人之文皆尚華麗妥貼而退之乃聱牙如此宜乎點額也懶真子卷二
