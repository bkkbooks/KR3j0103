body:
  text: 懶真子卷三宋馬永卿撰藝祖既平江南詔以兵器盡納揚州不得支動號曰禁庫方臘作亂童貫出征許於逐州軍選練兵仗既開禁庫兩房將士望見所貯弓挺直大喜曰此良弓也因出試之宛然如新是日弓數千張立盡噫自開寶之乙亥至宣和之辛丑一百四十七年而膠漆不脫可謂異矣女真犯闕東南起勤王之師僕時為江都丞帥臣翁彥國令揚州作院造神臂弓限一月成皆不可用當時識者以為國初之弓限一年成而今成於旬日之間宜乎美惡之相絶也僕考考工記然後知弓非一年不可用也弓人為弓取六材必以其時凡為弓冬析幹春液角夏治筋秋合三材寒奠體氷析灂春被弦則一年之事鄭氏注云期年乃可用且三代之時百工傳氏孫襲祖業子受父訓故其利害如此詳盡我藝祖奮起於五代之後而制作之妙逺合三代不亦聖謨之宏逺乎洛中邵康節先生術數既髙而心術亦自過人所居有圭竇甕牗圭竇者墻上鑿門上鋭下方如圭之狀甕牗者以敗甕口安於室之東西用赤白紙糊之象日月也其所居謂之安樂窩先生以春秋天色溫涼之時乘安車駕黃牛出遊於諸公家諸公皆欲其來各置安樂窩一所先生將至其家無老少婦女良賤咸迓於門迎入窩爭前問勞且聽先生之言凡其家婦姑妯娌婢妾有爭競經時不能決者自陳於前先生逐一為分別之人人皆得其歡心於是酒殽競進厭飲數日徐遊一家月餘乃歸非獨見其心術之妙亦可想見洛中士風之美聞之於司馬文仲楫前漢百官表少府之屬官凡五十餘人有遵官掌米穀以奉至尊然學者多疑遵字之義僕考唐百官志導官令掌導擇米麥凡九穀皆隨精粗考其耗損而供然漢導字下從寸唐䆃字下從禾今按䪨略瑞禾一莖六穗謂之䆃恐唐以瑞禾名官也僕嘗以此問舅氏笑云此蓋讀司馬長卿封禪書誤耳書云導一莖六穗於包注云導擇也一莖六穗謂嘉禾之米也後人誤以瑞禾為䆃遂併官名失之可一笑也舅氏張文林相茂實端方不偶卒於銓曺前漢初去古未逺風俗質略故太上皇無名母媪無姓然唐宰相世系表敘劉氏所出云昔士會適秦歸晉有子留於秦自為劉氏秦滅魏徙大梁生清徙沛生仁號豐公生煓字執加生四子伯仲邦交邦漢髙帝也噫髙皇之父漢史不載其名而唐史乃載之此事亦可一笑煓音端唐史韓退之傳擢監察御史上疏極諫宫市德宗怒貶陽山令此説非也集中自載御史臺論天災人飢狀故退之寄三學士詩云是年亰師旱田畝少所收適會除御史誠當得言秋拜疏詣閣門為忠寧自謀上陳人疾苦無令絶其喉下言畿甸內根本理宜優積雪驗豐熟幸寬待麥牟天子惻然感司空歎綢繆謂言即施設乃返遷炎州以此驗之其不因宫市明矣然退之所論亦一時常事而遽得罪者蓋疏中有云此皆羣臣之所未言陛下之所未知故執政者惡之遽遭貶也既貶未幾有八司馬之事使退之不貶與劉栁輩俱陷黨中則終身禁錮矣或云退之豈與栁劉輩同乎僕曰退之前詩又云同官盡才俊偏善栁與劉使其不去未必不落黨中然則陽山之貶其天相哉司空謂杜佑也宰相年表十九年二月佑檢校司空俗諺云一絇絲能得幾時絡以喻小人之逐目前之樂也然絇字當作緰太玄經絡之次五日蜘蛛之務不如蠶一緰之利緰音七候反與絇同音今以太玄證之故絇當作緰唐時前輩多自重而後輩亦尊仰前輩而師事之此風最為淳厚杜工部於蘇端薛復筵簡薛華醉歌首云文章有神交有道端復得之名譽早又云坐中薛華善醉歌醉歌自作風格老一篇之中直呼三人之名想見當世士人一經老杜品題即有聲價故當世願得其品題不以呼名為耻也近世士大夫老幼不復敦篤雖前輩詩中亦不敢斥後進之名而後進亦不復尊仰前輩可勝嘆哉陳待制邦先字應賢初任差作試官發解進士程文中犯聖祖諱衝替問之云因用莊子飾小説以干縣令而疏云縣字古懸字多不著心懸髙也謂求髙名令聞也然僕以上下文考之揭竿纍以守鯢鮒其於得大魚亦難矣飾小説以干縣令其於大道亦逺矣蓋揭竿纍以譬飾小説也守鯢鮒以譬干縣令也彼成玄英膚淺不知莊子之時已有縣令故為是説史記莊子列傳莊子與梁惠王齊宣王同時史記年表秦孝公十二年并諸小鄉聚為大縣縣一令是年乃梁惠王之二十二年也且周嘗往來於楚魏之間所謂監河侯乃西河上一縣令也時但以侯稱之耳而疏乃以為魏文侯不知與惠王之時相去逺矣且監河侯云我得邑金是以知為縣令也若晉申公巫臣為邢大夫而其子稱邢侯之類是也唐人字畫見於經幢碑刻文字者其楷法往往多造精妙非今人所能及蓋唐世以此取士而吏部以此為選官之法故世競學之遂至於妙唐選舉志云凡擇人之法有四一曰身體貌豐偉二曰言言辭辨正三曰書楷法遒美四曰判文理優長或曰此敝政也豈可以字畫取人乎難之者曰今之士人於此狀貌竒偉言辭辨博判斷公事既極優長而更加以字畫遒美有歐虞禇薛顔栁之法士大夫能全此美者亦自難得况銓選之間乎聞之者皆服天聖中鄧州秋舉舊例主文到縣鄉中長上率後進見主文是年主文乃唐州一職官年老鬚鬢皓然説贄見有輕薄後生前曰舉人所係甚大願先生無渴睡既引試賦桐始華以姑洗之月桐始華矣依次用韻滿場閣筆不下乃復至簾前啓曰前日無狀後進輒以妄言仰瀆先生果蒙以難韻見困願易之主文曰老人渴睡不能卒易可來日再見訪諸生諾而退是夜主文遂遁去車運司云鄧州滿場曵白是年遂罷舉聞之於南陽老儒李億億又云昔待監司極小又士人多自重不肯妄求故多老於選調今印榜文額有之字者蓋其來久矣太初元年夏五月正厯以正月為歲首色尚黃數用五注云漢用土數五五謂印文也若丞相曰丞相之印章諸卿及守相印文不足五字者以之字足之僕仕於陕洛之間多見古印於蒲氏見廷尉之印章於司馬氏見軍曲侯丞印此皆太初以後五字印也後世不然印文榜額有三字者足成四字有五字者足成六字但取其端正耳非字本意五栁與子儼等疏云汝等雖不同生又云况共父之人則知五子非一母或云以五栁之清髙恐無庶出但前後嫡母耳僕以責子詩考之正自不然詩云白髮被兩鬢肌膚不復實雖有五男兒總不好紙筆阿舒已二八懶墮固無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覔梨與栗天運茍如此且進杯中物且雍端二子皆年十三則其庶出可知也已噫先生清德如此而乃有如夫人亦可一笑醒軒云安知雍端非雙生子富鄭公留守西京日因府園牡丹盛開召文潞公司馬端眀楚建中劉凡邵先生同會是時牡丹一欄凡數百本坐客曰此花有數乎且請先生筮之既畢曰凡若干朵使人數之如先生言又問曰此花幾時開盡請再筮之先生再三揲蓍坐客固已疑之先生沉吟良久曰此花命盡來日午時坐客皆不答溫公神色尤不佳但仰視屋鄭公因曰來日食後可會於此以驗先生之言坐客曰諾次日食罷花尚無恙洎烹茶之際忽然羣馬廄中逸出與坐客馬相蹄齧奔出花叢中既定花盡毁折矣於是洛中逾服先生之言先生家有傳易堂有皇極經世集行於世然先生自得之妙世不可傳矣聞之於司馬文季朴元城先生嘗言異哉盧杞之為人也不獨愧見父祖又且愧見其子也盧氏唐甲族也而懷慎一派為盛懷慎以清德相玄宗號為名相而生東都留臺奕奕罵祿山被害在忠義傳奕生把相德宗敗亂天下在姦臣傳杞生元輔元輔傳云端靜介正能紹其祖故厯顯劇任而人不以杞之惡為異亦附忠義傳故曰把不獨愧見其父祖又且愧見其子也元城先生劉待制安世字器之云葭灰秋吹季月管日出卯南暉景短友生招我佛寺行正直萬株紅葉滿光華閃壁見神鬼赫赫炎官張火傘然雲燒樹火實駢金烏下啄頳虬卵魂翻眼暈忘處所赤氣沖融無間斷有如流傳上古時九龍照燭乾坤旱右韓退之遊青龍寺詩僕舊讀此詩以為此言乃喻畫壁之狀後見長安志云青龍寺有柿萬株此蓋言柿熟之狀火傘頳虬卵赤氣沖融九龍照燭皆其似也青龍寺在長安城中白樂天新昌新居詩云丹鳳樓當後青龍寺在前以此可知長安諸寺多柿故鄭虔知慈恩寺有柿葉數屋取之學書僕仕於關陕行村落間常見柿連數里欲作一詩竟不能竒每嗟火傘等語誠為善喻東坡詩云剩欲去為湯餅客却愁錯寫弄麞書弄麞乃李林甫事湯餅人皆以為眀皇王后故事非也劉禹錫贈進士張盥詩云憶爾懸弧日余為座上賔舉筯食湯餅祝辭添麒麟東坡正用此詩故謂之湯餅客也必食湯餅者則世所謂長命麵者也古今之語大都相同但其字各别耳古所謂阿堵者乃今所謂兀底也王衍口不言錢家人欲試之以錢繞床不能行因曰去阿堵物謂口不言去却錢但云去却兀底爾如傳神寫照正在阿堵中蓋當時以手指眼謂在兀底中爾後人遂以錢為阿堵物眼為阿堵中皆非是蓋此兩阿堵同一意也然去有兩音一邱據反乃去來之去世常從此音非也當作口舉反韻略云撤也然此義亦非也蘇武掘鼠所去草實而食之乃鼠所藏者也蓋衍之意以謂此錢不當置於此當屏藏之於他處也蔡忠懷確持正少年嘗夢為執政仍有人告之曰俟汝父作狀元時汝為執政也持正覺而笑曰鬼物乃相戲乎吾父老矣方致仕間居乃云作狀元何也後持正果作執政一日侍殿上聽唱進士第狀元乃黃裳也持正不覺失驚且嘆夢之可信也持正父名黃裳乃泉州人清正恬退以故老於銓曺嘗為建陽令及替囊無建陽一物至今父老能道之最後以贊善大夫為鎮安軍節度推官鎮安陳州也官滿貧不能歸故忠懷遂為陳州人此聞之於忠懷之孫橝子正僕問子正為幕職而帶贊善大夫何也子正云此祖宗時官制蓋以久次而得之自不可解僕仕於關中嘗見一方寸古印印文云關外侯印其字作古𨽻氣象頗類受禪碑僕意必漢末時物也然疑只聞有關內侯不聞有關外侯後於魏志見之建安二十三年始置名位侯十二級以賞軍功關外侯乃其一也注云今人虛封蓋始於此揚州檢法冦中大庠河朔人也好為大言以屈座人一日於客次中問坐客云左傳山木如市弗加於山魚鹽蜃蛤弗加於海注云如在山海賈不加貴何也庠乃以此八字平分作兩句故座客卒然不能答庠意氣甚自得時僕為江都丞獨後至見諸人默然庠復舉前語問僕笑曰此乃一句何為分為兩句也庠笑曰果然謾不得蓋晏子之意以謂陳氏施私恩以收人心故低價以授與民是以山木魚鹽之類雖在齊國如在山海之中不加貴也賈讀如價非商賈之賈今之同席者皆謂之客非也古席靣謂之客列座謂之旅主謂之獻客謂之酬故宋享晉楚之大夫趙孟為客注云客一座所尊也季氏飲大夫酒臧紇為客既獻臧孫命北靣重席新樽潔之召悼子降逆之大夫皆起及旅而召公鉏注云獻酬禮畢而通行為旅然則古者主先獻客客復酬之然後同席皆飲不如今之時不待獻酬而同席皆飲也韓退之上宰相書云四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畝之宅其可懷僕嘗怪貞元七年兵部侍郎陸贄知禮部貢舉退之是時及第八年四月贄拜相而退之以宰相門生連三年試於吏部而不得何也十年十二月贄罷為太子賔客十一年退之於正月二月三月連三上書於賈耽輩不亦踈乎祗取辱耳後世之士可以為戒本朝取士之路多矣得人之盛無如進士蓋有一榜有宰相數人者古無有也太平五年蘇易簡下李沆向敏中寇凖王旦咸平五年王曽下王隨章得象淳化三年孫向下丁謂王欽若張士遜慶厯三年楊置下王圭韓絳王安石吕公著韓縝蘇頌元豐八年焦蹈下白時中鄭居中劉正夫其餘名臣不可勝數此進士得人之明效大驗也或曰不然以本朝崇尚進士故天下英才皆入此科若云非此科不得人則失之矣唐開元以前未嘗尚進士科故天下名士雜出他塗開元以後始尊崇之故當時名士中此科者十常七八以此卜之可以見矣佛果禪師川勤極善禪纚纚可聽嘗云閻浮提雨清淨水具諸天相方時大旱雨時忽降莫知其價此兜率天上雨摩尼也方欲收禾霖雨不止實害人命此阿修羅中雨兵仗也甘雨得時人皆飽足此護世城中雨美膳也但名不同其實一也坐客云經中所言皆譬喻也豈有雨寶珠等事乎僕曰不然雨金雨血雨土皆班班載於前史何况六合外事其有無不可懸料也坐客咸以為然其上因緣出華嚴經第十五卷二十八宿今韻略所呼與世俗所呼往往不同韻略宿音繡亢音剛氐音低觜音訾皆非也何以言之二十八宿謂之二十八舍又謂之二十八次次也舍也皆有止宿之意今乃音繡此何理爾雅云夀星角亢也注云數起角亢列宿之長故有髙亢之義今乃音剛非也爾雅天根氐也注云角亢下繫於氐若木之有根其義如周禮四圭有邸漢書諸侯上邸之邸音低誤矣西方白虎而觜參為虎首故有觜之義音訾誤矣彼韻略不知但欲異於俗不知害於義也學者當如其字呼之國初號令猶有漢唐之遺風大中祥符元年正月三日天書降大赦改元東都賜酺三日此蓋漢遺事也漢律三人以上無故飲酒罰金四兩故漢以賜酺為惠澤令得羣飲酒也酺音蒲注曰王德布於天下而令聚飲食為酺或問賜酺起於漢乎僕對曰趙世家載武靈王行賞大赦置酒酺五日則自戰國時已如此矣祥符詔書聖祖殿有刻石吾祖僕射忠肅公亮知荆南府日常苦嗣續寡少因聞玉泉山頂有道人草菴其上號白骨觀道人年八十矣宴坐菴中常想自身表裏洞逹惟見白骨以觀他人亦復如是如此五十年矣忠肅因使人問訊亦不答贈遺亦不受頻頻如此亦略受公繼而入山訪之道人亦喜因請出山暫至府第延之正寢安下經月乃歸一日忠肅夢道人策杖徑入正寢方驚愕間夢覺且歎訝之急使人往問訊曰昨夕已遷化矣既茶毗骨有舍利後遂生給事子山仲南兩嵗已能趺坐方學語時但言凡所見人皆是白骨後至七嵗已往漸不見噫其性移矣給事學佛有見處古君子也僕以此語長蘆了老了老云吾門謂之空門今作白骨觀已自墮落况有人誘引之乎僕以此言為然俗説以人嚏噴為人説此蓋古語也終風之詩曰寤言不寐願言則嚏箋云言我願思也嚏當為不敢嚏咳我真憂悼而不能寐如思我心如是我則嚏也今俗人嚏云人道我此乃古之遺語也漢藝文志雜占十八家三百一十卷內嚏耳鳴雜占十六卷注云嚏丁計反然則嚏耳鳴皆有吉凶今則此術亡矣山濤見王衍曰何物老嫗生寧馨兒寧作去聲馨音亨今南人尚言之猶言恁地也前宋廢帝悖逆太后怒語侍者曰將刀來剖我腹那得生寧馨兒此兩寧馨同為一意僕仕於關中於士人王毖君求家見一古物似玉長短廣狹正如中指上有四字非篆非𨽻上二字乃正月字也下二字不可認問之君求云前漢剛卯字也漢人以正月卯日作佩之銘其一靣曰正月剛卯乃知今人立春或戴春勝春幡亦古制也蓋剛者強也卯者劉也正月佩之尊國姓也與陳湯所謂強漢者同義蘭亭序在南朝文章中少其倫比或云絲即是絃竹即是管今疊四字故遺之然此四字乃出張禹傳云身居大第後堂理絲竹管絃始知右軍之言有所本也且文選中在蘭亭下者多矣此蓋昭眀之誤耳蔡忠懷確持正其父本泉州人晚年為陳州幕官遂不復歸持正年二十許嵗時家苦貧衣服稍敝一日與羣士人張湜師是同行張亦貧儒也俄有道人至注視持正久之因謾問曰先生能相乎曰然又問曰何如曰先輩狀貌極似李德裕持正以為戲已因戲問曰為相乎曰然南遷乎曰然復相師是曰當為卿監家五十口時指持正云公當死矣道人既去二人大笑曰狂哉道人以吾二人貧儒故相戲耳後持正謫新州凡五年一日得師是書云以為司農無補然闔門五十口居京師食貧近蒙恩守汝州持正讀至此忽憶道人之言遂不復讀數日得疾而卒聞之於忠懷之孫橝子正有客問僕曰古今太守一也而漢時太守赫赫如此何也僕曰漢郡極大又屬吏皆所自除故其勢炎炎非後世比只此會稽郡考之縣二十六吳即蘇州也烏傷即婺州也毗陵即常州也山隂即越州也由拳注云古之檇李即秀州也大末衢州也烏程湖州也餘杭杭州也鄞明州也以此考之即今浙東西之地乃漢一郡爾宜乎朱買臣等為之氣熖赫赫如此也前漢凡三處載召平蕭何傳召平即東陵侯也項羽傳召平即廣陵人也齊悼惠王傳齊相召平不知何許人為魏勃所紿至自殺乃曰嗟乎道家之言當斷不斷反受其亂僕頃在海州常與任景初陳子直論之景初曰此必非東陵侯且淮隂侯在蕭何術中而東陵常為何畫策其術髙矣必不為勃所紿子直曰不然夫為人畫䇿則工若自為計多拙故曰傍觀者審當局者迷二人爭論不已僕從傍解之曰謂之非東陵侯既無所據必為東陵侯恐受屈子直曰獨廣陵召平不在論中何也僕因大笑曰僕廣陵人也上不敢望東陵下不肯為齊相况僕平生處已常在於才與不才之間宜乎不在論中也子直由此號余為廣陵召平僕自南渡以來始信前人言之可信也蓋北人長於騎射其所以取勝獨以馬耳故一人復有兩馬此古法也北征詩云隂風西北來慘淡隨回鶻其王願助順其俗喜馳突送兵五千人驅馬一萬匹是知一人有兩馬也中國若不修馬政豈能勝之蓋用兵之法弓馬必有副詩云交韔二弓畏毁折也與兩馬同意元城先生與僕論唐十一族事先生曰甘露之事蓋亦踈矣考其時乃太和九年十一月二十一日也是時李訓謀以甘露降於禁中詔百官入賀因此欲殺宦官耳十一月末豈甘露降之時耶其謀之踈想見太抵色色如此吾意宦官知此謀久矣故不可得而殺且天下之事有大於死者乎凡可以救死者無不為也若當時只貶黜之其禍未必至此今乃以死逼人而踈略如此宜其敗也易曰君不密則失臣臣不密則失身幾事不密則害成聖人之言信矣懶真子卷三
