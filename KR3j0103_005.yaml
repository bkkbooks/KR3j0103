body:
  text: 嬾真子卷五宋馬永卿撰紹興三年夏六月明州阿育王山住持凈曇以宸奎閣所藏仁宗御書詣行在所獻書凡五十三軸字體有三一曰真書二曰飛白三曰梵書其上二書世多見之而梵書亦自竒古可駭愕也又有團絹扇三柄皆有御書一長柄者三尺許恐是打扇用白藤縛柄而三扇皆以青牋紙為上下承萼制度極草草今中産之民所耻也大哉仁宗之盛德也唐史載鄭䖍集當世事著書八十餘篇目其書為會粹老杜哀故著作郎貶台州司户滎陽鄭公䖍詩云薈蕞何技癢又按韻畧薈烏外切草多貌如薈兮蔚兮之薈蕞徂外切小也如蕞爾國之蕞䖍自謂其書雖多而皆碎小之事也後人乃誤呼為㑹粹意為會取其純粹也失之逺矣蓋名士目所著書多自貶若雞肋脞說之類皆是意也技癢者謂人有技藝不能自忍如人之癢也老杜以謂䖍私撰國史亦不能自忍爾蕞一音在外切小也兩音一意楚子問齊師之言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之渉吾地也何故注云馬牛之風佚蓋末界之微事故以取論然注意未甚明白僕後以此事問元城先生曰此極易解乃醜詆之辭爾齊楚相去南北如此遠離馬牛之病風者猶不相及今汝人也而輙入吾地何也僕始悟其說即書所謂馬牛其風注云馬牛其有風佚此兩風字同為一意僕讀史記因嘆曰天道逺矣吁可畏也秦昭王四十八年始皇生於邯鄲年十三即位是嵗甲寅然是年豐沛已生漢髙皇帝矣後十五年己巳項羽生二十七年始皇南廵會稽時年已二十三矣其年七月始皇崩二世元年九月沛公起沛時年三十九項羽起㑹稽時年二十四漢元年髙帝至㶚上時年四十二十二月羽繼至遂殺子嬰而㓕秦髙帝在位十二年五十三而崩時嵗在丙午噫消長倚伏其運宻矣政和中僕仕關中於同官蒲氏家乃宗孟之後見漢印文云輯濯丞印文竒古非𨽻非篆在漢印中最佳輯濯乃水衡屬官輯讀如楫濯讀如櫂蓋船官也水衡掌上林上林有船官而楫濯有令丞此蓋丞印也然皆太初元年已前所刻太初已後皆五字故也元城先生嘗與僕論魏丞相不能救蓋寛饒之死今追録之神爵二年九月司𨽻校尉蓋寛饒有罪下有司自殺三年三月丙午丞相相薨識者以謂有天道焉且相嘗謂次公醒而狂且以字呼之是必平日朋友也平日以狂待之則宣帝之怒相必無一言以救之宣帝初下其書中二千石議也執金吾議以為大逆不道然則中二千石共議以為大逆不道獨執金吾一人耳百官表神爵二年南陽太守賢為執金吾不知賢者何人也必醜邪惡正嘗為蓋司𨽻所劾者也賢不足道也獨相號為賢相又與寛饒彼此皆儒者平日交友獨不能為地相可責哉禮記載曽子數子夏之罪云吾昔與女從夫子於洙泗之間退而老於西河之上使西河之人疑汝於夫子汝罪三也注云言其不稱師也蓋古之君子言必稱師示有所授且不忘本也故子張一篇載羣弟子之語子夏之言十一而未嘗稱師曽子之言五而三稱曰吾聞諸夫子則子夏為曽子所罪固其宜矣禮記樂正子春曰吾聞諸曽子曾子聞諸夫子蓋曽子稱師故子春亦稱師也又知古人注解各有所本不若後人妄意穿鑿也淵明之為縣令蓋謂貧爾非為酒也聊欲絃歌以為三徑之資蓋欲得公田之利以為三徑閒居之資用爾非謂旋創田園也舊本云公田之利過足為潤後人以其好酒遂有公田種秫之說且仲秋至冬在官八十餘日此非種秫時也故凡本傳所載與歸去來辭序不同者當以序為正髙郵老儒黄移忠彦和僕幼稚常師之嘗謂孟子去齊三宿而出畫讀如晝夜之晝非也史記田單傳後載燕初入齊聞畫邑人王蠋賢劉熈注云齊西南近邑音獲故孟子三宿而出時人以為濡滯今之書尺稱人之德羙繼之曰不佞不佞意謂不敢諂佞非也左氏昭公二十一年載奮揚之言曰臣不佞注云佞才也漢文帝曰寡人不佞注云才也論語云不有祝鮀之佞注亦云才也古人佞能通用故佞訓才左氏載祝鮀之言行極備葢衞之君子也衞之宋朝姿貌甚羙衞靈公夫人南子通之孔子之意葢為無祝鮀之才而有宋朝之容則取死之道故曰難乎免於今之世矣僕友孫亞之自呼曰雅朱耆卿自呼曰刑或問有故事乎僕曰孟施舎之養勇也又曰舎豈能為必勝哉注曰施舎自呼其名但曰舎葢其好勇而氣急也恐起於此僕任夏縣令一日會客於蓮塘上時苦蛙聲坐中有州官乃長安人以微言相戲妄謂僕南人食此也僕答曰此是長安故事客曰未聞也僕取東方朔傳示之客始伏武帝欲籍阿城以南盩厔以東宜春以西為上林苑朔諌以謂此地土宜薑芋水多䵷魚貧者得以人給家足無飢寒之憂師方曰䵷即蛙字似蝦蟆而小長脚蓋人亦取食之僕嘗與陳子真查仲本論將無同仲本曰此極易解謂言至無處皆同也子真曰不然晉人謂將為初初無同處言各異也僕曰請以唐時一事證之霍王元軌與處士劉平為布衣交或問王所長於平曰王無所長問者不解平曰人有所短則見所長蓋阮瞻之意以謂有同則有異今初無同何况於異乎此言為最妙故當時謂之三語掾二子皆肯之揚州天長道中地名甘泉有大古塜如山未到三十里已見之土人呼為瑠璃王塜按廣陵王胥武帝子也都於廣陵後至宣帝時坐謀不軌賜死謚曰厲後人誤以劉厲為瑠璃爾漢制天子諸侯即位即立太子起陵塜故能如此髙大胥雖以罪死尚葬其中故胥且死謂太子􅄵曰上遇我厚今負之甚我死骸骨當暴幸而得葬薄之無厚也旁有居民數十家地名甘泉或恐胥僣擬云文房四物見於傳記者若紙筆墨皆有據至於硯即不見之獨前漢張彭祖少與上同研席書又薛宣思省吏職下至筆硏皆為設方畧蓋古無硯字古人諸事簡易凡研墨不必硯但可研處只為之爾矛盾螭㘭載於前世不若今世事事冗長故只為之研不謂之硯然任緝之北征記孔子廟中有石硯一枚乃夫子平生物非經史不足信荆公字解妙字云為少為女為無妄少女即不以外傷内者也人多以此言為質殊不知此乃郭象語也莊子云綽約若處子注云處子不以外傷内公之言蓋出於此退之以毛頴為中山人者蓋出於右軍經云唯趙國毫中用蓋趙國平原廣澤無雜木唯有細草是以兎肥肥則毫長而銳此良筆也孟子云有楚大夫於此欲其子之齊語也又云引而置之莊嶽之間數年蓋莊嶽乃齊國繁㑹之地孟子在齊久故知其處今以左傳考之可見莊嶽之地襄公二十八年齊亂十一月丁亥慶封伐西門弗克伐南門克之又伐内宫弗克又陳於嶽注云嶽里名也哀公六年夏六月戊辰陳乞鮑叔以甲入於公宫國夏髙張乗如公戰於莊敗注云莊六軌之道也以最繁會故可令學齊語古以右為上且以左相言之謂非正相如輔佐之佐耳左氏傳薛宰之言仲虺居薛以為湯左相又齊崔杼立景公而相之慶封為左相蓋伊尹者湯之相也而仲虺特輔佐伊尹耳故曰左相崔杼慶封亦復如此故漢孝惠時王陵為左丞相王陵既免徙平為右丞相文帝初立周勃功髙陳平謝病上視平病問之平曰髙帝時勃功不如臣及誅諸吕臣功不如勃願以相遜勃於是以大尉勃為右丞相位第一平為左丞相位第二非獨如此周昌自御史大夫左遷為趙相黃覇以財入官兩府不與右職與此同類今人亦以降為左遷古人姓名有不可解者文公十八年季文子云髙陽氏有才子八人注云髙陽顓頊帝號也八人其苖裔蒼舒隤敳檮戭大臨龎降庭堅仲容叔逵注云此即垂益禹皋陶之倫庭堅皋陶字也然有可疑者文公五年楚㓕六蓼臧文仲聞六㓕曰皋陶庭堅不祀忽諸注云六蓼皆皋陶後也且既云庭堅即皋陶字則文仲不應既曰皋陶又曰庭堅也若據其意則皋陶庭堅又似兩人山谷老人名庭堅字魯直其義不可解或云慕季文子之逐莒僕故曰魯直唐史載崔湜執政時年三十八嘗暮出端門緩轡諷詩張說見之嘆曰文與位固可及其年不可及也僕初讀此謂說之年遲暮與湜相去絶矣及以二人本傳考之相去纔四嵗爾今按宰相年表湜執政時乃景龍二年戊申推而上之生於咸寧二年之辛未張說傳稱說開元十八年卒年六十四推而上之乃生於乾封二年之丁卯至景龍二年戊申說本年四十二嵗而歎慕之如此藉使宋廣平見之必無此語廣平嘗見蕭至忠出太平公主第謂至忠曰非所望於蕭傅非獨不慕且以為戒眉山蘇氏文集著權書衡論衡論世皆知出處獨權書人少知之漢哀帝時欲辭匈奴使不來朝黃門郎揚雄上書諫曰髙皇后嘗怒匈奴羣臣廷議樊噲請以十萬衆横行匈奴中季布曰噲可斬也於是大臣權書遺之注曰以權道為書順辭以答之權書之名蓋出於此衡取其平權取其變衡為一定之論權乃變通之書柴慎微云淮隂信可謂忠矣漢待之何其薄也賛曰天下既定命韓信申軍法此乃信為淮隂侯在長安奉朝請時也漢五年二月漢王即皇帝位六年十二月執信於陳十二年九月伏誅且信之長安也漢實囚之而乃能為漢申軍法即其忠可知矣蓋漢實畏其能故信卒不免田肯有云陛下已得韓信又治關中則知此兩事乃當時安危存亡之機且信之聲名使人畏之如此其不亡何待李百藥父與友陸人等共讀徐陵文有刈琅邪之稻之語歎不得其事百藥進曰春秋鄅子籍稻杜預謂在琅邪客大驚號竒童今按昭公十八年傳鄅人籍稻注云鄅妘姓國也其君自籍稻蓋履行之昭公十八年經書邾人入部注云鄅國今琅邪開陽縣也蓋籍當呼為典籍之籍謂履行之而記其數也周之六月夏之四月稻方生也而徐陵以為刈非矣莊子之䟽有可以一大笑者徐無鬼語武侯相馬曰直者中繩曲者中鈎圓者中規方者中矩謂馬歩驟廻旋中規矩鈎繩也故東野後以御見莊公進退中繩左右旋中矩同一意也䟽乃以直為馬齒曲為馬項方為馬頭圓為馬眼且世間豈有四方馬頭乎故可以一大笑唐中興頌云復復指期或云以復兩京故曰復復非也此兩字出漢書今按匡衡傳云所更或不可行而復復之注云下復扶目反又何武為九卿時奏言宜置三公官又與翟方進共奏罷刺史更置甘州牧後皆復復故注云依其舊也下復扶目反蓋上音服下音福謂復如故也唐中興頌宜亦如此讀之玉子紋楸一路饒偏宜簷竹雨蕭蕭羸形暗去春泉長猛勢横來野火燒守道還如周伏柱鏖兵不愧霍嫖姚得年七十更萬日與子同於局上消右杜牧之贈國手王逄詩或云此真贈國手詩也棊貪必敗怯又無功羸形暗去則不貪也猛勢横來則不怯也周伏柱以喻不貪霍嫖姚以喻不怯故曰髙棋詩也杜牧嘗云棋於貪勇之際所得多矣七十更萬日者牧之是時年四十二三得至七十猶有萬日韓魏公父諫議大夫國華嘗仕於蜀蜀中士人胡廣善相術見諫議而竒之曰是必生貴子請納女焉後諫議出守泉州祥符元年戊申嵗七月二日生魏公於泉州州宅僕與韓氏交遊嘗見諫議胡夫人畫像皆竒偉宜其生貴人也世言魏公世居河朔故其狀貌竒偉而有厚重之德然生於泉州故為人亦微任術數深不可測有閩之風皆其土風然也聞者以為然或問漢臣朝服僕云張敞議云敞備皂衣二十餘年注云雖有五等服至朝皆着皂衣又谷永書云擢之皂衣之吏厠之諍臣之末則知漢朝之服皆皂衣也周禮衮冕九章鷩冕七章毳冕五章絺冕三章元冕衣無文裳刺黻而已故曰卿大夫之服自元冕而下如孤之服則皂衣者乃周之卿大夫元冕也漢之皂衣蓋本於此金陵詩云嵗晚蒼官聊自保日髙青女尚横陳蒼官謂松也青女謂霜也言日髙而松上霜猶不消也横陳出楞嚴經六欲界中云我無慾應女行事當横陳時味如嚼蠟以言道人處世間雖有慾而無味也蓋荆公自謂如蒼官自保但青女横陳不能已耳此言近於雅謔殊有深意元城先生嘗論及漢髙帝功臣曰屠狗販繒之徒呼繒字與餳相近後檢漢灌嬰傳注云帛之總名而已今按韻略繒慈陵切注云帛也増咨登切則世人以繒為増誠非也尚書厥篚𤣥纎縞注云𤣥黑繒也縞白繒也釋音云似陵反禮運云瘞繒注云弊帛曰繒釋音似仍反左氏衞文公大帛之冠注云大帛厚繒繒疾陵切晉書地理志繒才陵反以諸音義考之當以疾陵為正許洛之間極多竒士宣和中崔朝奉鶠德符監洛陽稻田公務一日送客於會節園官客佐拘入會節以為景華御苑德符不知也晚春復騎瘠馬與老兵由園内坐梅下哦詩其間有曰去年白玉花結子深林間少憩藉清影低顆遂微酸次日佐入園見地有馬糞知是崔朝奉是時府官事佐恐不及而德符未嘗謁之因此劾奏擅入御苑作踐遂勒停德符傳食於諸人家久之斂錢復歸陽翟聞之田元邈云洛中士人張起宗字起宗以教小童為生居於會節園側年四十餘一日行於内前見有西來行李甚盛問之曰文樞宻知成都回也姬侍皆騎馬錦繡蘭麝溢人眼鼻起宗自歎曰我丙午生相逺如此傍有瞽卜輙曰秀才我與汝算命因與藉地卜者出算子約百餘布地上幾長丈餘凡關兩時曰好笑諸事不同但三十年後有某星臨某所兩人皆同當並案而食者九箇月起宗後七十餘嵗時文公亦居於洛起宗視其交遊飲宴者皆一時貴人輙自疑曰余安得並案而食乎一日公獨遊會節園問其下曰吾適來聞園側教學者甚人對曰老張先生曰請來及見大喜問其甲子又與之同因呼為會節先生公每召客必預召赴人會無先生則不徃公為主人則拐於左公為客則拐於右並案而食者將及九月公之子及甫知河陽府公往視之公所居私第地名東田有小姬四人謂之東田小藉共升大車隨行祖於城西有伶人素不平之因為口號曰東田小藉已登油壁之車會節先生暫別玳筵之宴坐客微笑自此潞公復歸洛不復召之矣瞽之言異哉聞之於司馬文季朴蘇秀道中有地名五木出佳酒故人以五木名之然白樂天為杭州太守日有詩序云錢湖州以箬下酒李蘇州以五酘酒相次寄到詩云勞將􅀢下忘憂物寄與江城愛酒翁鐺脚三州何處會甕頭一盞幾時同傾如竹葉盈樽緑飲作桃花上靣紅莫恠慇懃最相憶曾陪西省與南宫僕嘗以此問於僕之七舅氏云酘字與羖同意乃今之羊羔兒酒也詳其詩意當以五羔為之以是酒名故從酉云樂天詩云竹葉盈樽緑謂箬下酒取竹有緑之意也桃花上靣紅謂五酘酒取桃花五葉也後人不知轉其名為五木蓋失之矣僕檢韻中酘字乃竇同音注云重釀酒也恐酘難轉而為木温公私第在縣宇之西北數十里質朴而嚴㓗去市不逺如在山林中㕔事前有棣華齋乃諸弟子肄業之所也轉齋而東有柳塢水四環之待月亭及竹閣西東水亭也巫咸榭乃附縣城為之正對巫咸山後有賜書閣貯三朝所賜之書籍諸處牓額皆公染指書其法以第二指尖抵第一指頭指頭上節微屈染墨書之字亦尺許大如世所見公生明字惟巫咸榭字差大爾園圃在宅之東温公嘗宿於閣下東畔小閣侍吏唯一老僕一更二㸃即令老僕先睡㸔書至夜分乃自罨火㓕燭而睡至五更初公即自起發燭㸃燈著述夜夜如此天明即入宅起居其兄且或坐於床前問勞話畢即回閣下駙馬都尉之名起於三國故何晏尚魏公主謂之駙馬都尉然不獨官名以駙馬給之蓋御馬之副謂之駙馬從而給之示親愛也故杜預尚晉文帝妹髙陸公主至武帝踐祚拜鎮南大將軍給追鋒車第二駙馬且晏如𫝊粉宜為禁嚴若預乃癭如瓠爾何至妻帝之女也始信前古帝婿唯擇人材不專以貌也後世浸失此意惜哉後漢以來方書中有五石散又謂之寒食散論者曰服金石人不可食熱物服之則兩熱相激故名謂之寒食則可也然晉史載裴秀服寒食散當飲熱酒而飲冷酒薨年四十八據此則又是不可飲冷物也後問一名醫答云食物則宜冷而酒則熱耳僕初不信後讀千金方第二十五卷解五石毒一切冷食唯酒須令温然則裴秀傳所謂當飲熱酒亦非王元道嘗言陜西子仙姑傳云得道術能不食年約三十許不知其實年也陜西提刑陽翟李熈民逸老正直剛毅人也聞人所傳甚異乃徃青平軍自驗之既見道貌髙古不覺心服因曰欲獻茶一盃可乎姑曰不食茶久矣今勉強一啜既食少頃垂兩手出玉雪如也須㬰所食之茶從十指甲出凝於地色猶不變逸老令就地刮取且使甞之香味如故因大竒之紹興六年夏僕與年兄何元章會於錢塘江上余因舉東坡詩云天外黑風吹海立浙東飛雨過江來元章云立字最為有力乃水踴起之貌老杜三大禮賦云九天之雲下垂四海之水欲立東坡之意蓋出於此或者妄易立為至祗可一笑嬾真子卷五
