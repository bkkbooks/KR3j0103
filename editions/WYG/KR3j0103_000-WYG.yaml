body:
  text: 嬾真子雜家類三雜説之屬提要臣等謹案嬾真子五巻宋馬永卿撰是編乃其􅄂記之書然亦多述劉安世語又開巻冠以司馬光事書中亦多稱光盖其淵源所自出也宋史藝文志著録晁陳二家書目乃皆不載然袁文為建炎紹興間人王楙為慶元嘉泰間人費衮為紹熙開禧間人文甕牖閒評駁其中印文五字一條楙野客叢書駁其中承露囊一條衮梁溪漫志駁其漢太公無名母媪無姓一條是其書未嘗不行于世特二家偶遺之耳其書末稱紹興六年盖成於南渡以後中間頗及􅄂事而考證之文為多如據漢書王嘉封事謂書無教逸欲有邦教當作敖謂陶潛游斜川詩開嵗倐五十當作五日與殷晉安别詩本十韻傳本誤脱一韻東坡亦誤和九韻謂杜甫詩虬鬚十八九字出漢書丙吉傳謂韓愈感二鳥賦序貞元十一年誤作十五年又考正曹成王碑衍文訛字及箋釋句讀謂前漢百官表少府之遵官據唐百官志當作導官謂成元英莊子疏不知其時已有縣令誤讀縣為懸解為髙名令聞謂古者席面之賓乃稱客列座之賓皆稱旅引左傳為證謂二十八宿中亢氐觜三星韻略皆誤音謂賜酺始趙武靈王謂河鼓之河當作何謂唐中興頌復復指期復復字本漢書匡衡傳皆引据確鑿不同臆說其謂離騷正則靈均乃小名小字雖無所考亦足以備一解惟頗㕘􅄂以二氏至謂韓愈亦深明佛理是亦安世之學喜談禪悦之餘派存而不論可矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:19846e8c4bf7606d6c645ecbfc57f875e7f8022524f719fdf8b7bae2050cc90f
