body:
  text: 嬾真子卷四宋馬永卿撰章聖皇帝東封禮成幸曲阜縣謁先聖廟時丁晉公扈從前一日與同輩兩三人先馳至廟省視饌具因入後殿乃孔子妃也問於孔氏族孔氏之妃何姓延祐延渥同對曰孔子年十九娶於宋之亓官氏女而生伯魚伯魚年五十而卒時孔子七十矣次日上至妃殿亦問其姓衆人未及對晉公以延祐之言對上曰出何典據晉公錯愕不及答延祐徐前曰出孔子家語時扈從者皆以此事為耻聞之於舒州下寨老儒俞汝平清時有味是無能閒愛孤雲靜愛僧獨把一麾江海去樂遊原上望昭陵右杜牧之自尚書郎出為郡守之作其意深矣蓋樂遊原者漢宣帝之寢廟在焉昭陵即唐太宗之陵也牧之之意葢自傷不遇宣帝太宗之時而逺為郡守也藉使意不出此以景趣為意亦自不凡况感寓之深乎此其所以不可及也元城先生與僕論禮記内則雞鳴而起適父母之所僕曰不亦太早乎先生正色曰不然禮事父與君一等一體父召無諾君命召無諾父前子名君前臣名今朝謁者必以鷄鳴而起適君之所而人不以為早葢以刑驅其後也今世俗薄惡故事父母之禮得已而已爾若士人畏犯義如犯刑則今人可為古人矣僕聞其言至今愧之余中行老朱服行中邵剛剛中葉唐懿中夫何執中伯通王漢之彦昭彦昭常於期集處自歎曰某獨不幸名字無中字故為第六行老應之曰只為賢不中時以為名答陽翟澗上丈人陳恬叔易一日忽改名欽命或者疑之曰豈非欽若王之休命而有仕宦之意平叔易曰不然吾正以時人不畏天故欲欽崇天道永保天命建中間京西都運宋喬年以遺逸舉授文林李方叔以詩嘲之曰文林換却山林興誰道山人索價髙晁以道嘲之曰處士何人為作牙盡携猿鶴到京華今朝老子成長笑六六峯前只一家聞之於王元道敦古淳化二年均州武當山道士鄧若拙善出神嘗至一處見二仙官議曰來春進士牓有宰相三人而一人極低如何一人曰髙下不可易也獨科甲可易耳不若以第二甲為第一甲道士既覺與其徒言之明年唱名上意適有宫中之喜因謂近臣曰第一甲多放幾人言止即止遂唱第一甲上意亦忽忽忘之至三百人方悟是年孫何牓三百五十三人而第一甲三百二人第二甲五十一人丁謂第四人王欽若第十一人張士遜第二百六十人後士遜三人入相致仕歸鄕遊武當山若拙弟子常為公言之僕為鄧州淅川令日聞之於鄖鄉士人劉可道僕嘗問元城先生先儒註太𤣥經毎首之下必列二十八宿何也先生曰周天二十八宿三百六十五度四分度之一而太𤣥經凡七百二十九賛乃此數也僕曰七百二十九賛分而為二合三百六十四度有半而不相應何也先生曰揚氏之意以謂其半不可合也故有踦賛嬴賛以應周天之數漢之正統以象歳也莽之僣竊乃閏位也故先儒於踦賛嬴賛之下注以為水火之閏而王莽傳賛所稱餘分閏位者蓋謂是噫子雲之數深矣同年小録載小名小字或問有故事乎或曰始於司馬犬子僕曰不然離騷經曰皇覧揆予于初度兮肇錫予以嘉名名予曰正則兮字予曰靈均且屈原字平而正則靈均則其小字小名也所謂皇者三閭稱其父也後人遂以皇覧為進御之書誤矣唐外戚傳云外家之成敗視主德之何如耳至哉此言也明皇之寵太真極矣故有馬嵬之事故老子云甚愛必大費孟子云不仁者以其所不愛及其所愛惟老杜於此事殊為得體詩云不聞商周衰中自誅褒妲謂若此事自出於明皇之意與夫君王掩靣救不得相去遠矣僕友司馬文季朴極知星嘗云前漢天文志牽牛為犧牲其北河皷大星上將左右星左右將此說非也且何皷乃牽牛也今分為二則失之矣爾雅云何皷謂之牽牛注云今荆楚人呼牽牛為擔皷擔者何也葢此星狀如皷左右兩星若擔皷之狀故謂之何皷何者如何天之休之何人但見何皷在天潢之間故易謂河非也僕為夏縣令寄居司馬文季朴家出藏先聖畫像示僕傳云王摩詰筆也僕因令善工摹之眼中神彩殊不相類使人意不滿畫象上長下短其背微偻以傳考之想當然爾莊子載老萊弟子出薪遇仲尼反以告曰有人於此脩上而超下末僂而後耳視若營四海注云長上而促下耳却近後而上僂末僂謂背微曲也然此皆可畫若夫視若營四海乃聖人憂天下之容非摩詰不能作關中名毉駱耕耕道曰莊子之言有於孫真人毉方相合者五苓散五味而以木猪苓為主故曰五苓莊子之言曰藥也其實堇也桔梗也雞壅也豕零也是時為帝者也郭注云當其所須則無賤非其時則無貴故此數種若當其時而用之則為主故曰是時為帝者也䟽云藥無貴賤愈病則良斯得之矣故藥有一君二臣三佐四使且如治風則以堇為君堇烏頭也去水則豕零為君豕零水猪零也他皆類此彼俗毉乃以本草所録上品藥為君中品藥為臣下品藥為佐使可一笑也禍福茫茫不可思大都早退是先知當君白首同歸日是我青山獨往時顧索素琴應不暇憶牽黄犬定難期蛟龍作醢麟為脯何似泥中拽尾龜右白樂天遊玉泉寺詩李訓鄭注初用事公知其必敗輙自刑部侍郎乞分司而歸時宰相王涯好琴舒元輿好獵故及之而拽尾龜所以自諭也龍醢事見左氏麟脯事見列仙傳晉史乃唐時文士所為但託之御撰耳天文志云天聰明自我民聰明以民為人且太宗不應自避其名又洛書乾曜度以乾為甄則太宗又不應為太子承乾避名也以此足見乃當時臣下所為爾臣下之文駕其名於人主已為失矣而人主傲然受之而不辭兩胥失矣僕之故友柴慎微嘗云開元太平宰相七人五人出太平公主門下謂岑羲竇懷真蕭至忠崔湜陸象先也二人明皇自用謂張說郭元振也且象先賢者也何為預五人之列按象先傳太平公主欲相崔湜湜力薦象先於主故遂相之噫象先何為交結崔湜也開元元年七月太平公主既敗而宰相出門下者如岑羲等四人皆被誅獨象先免使其不幸與四人者皆死豈不痛哉然則士大夫之所處宜以此為戒老杜遣悶詩云家家養烏鬼頓頓食黄魚所說不同筆談以為鸕鷀能捕黄魚非也黄魚極大至數百斤小者亦數十斤故詩云日見巴東峽黄魚出浪新脂膏兼飼犬長大不容身又有白小詩云白小群分命天然二寸魚細微霑水族風俗當園蔬蓋言魚大小之不同也僕親見一峽中士人夏侯節立夫言烏鬼猪也峽中人家多事鬼家養一猪非祭鬼不用故於猪群中特呼烏鬼以別之此言良是僕又見浙人呼海錯為蝦菜毎食不可闕始悟風俗當園蔬之意始元五年春正月夏陽男子張延年詣北闕自稱衞太子然雋不疑傳云本夏陽人姓成名方遂且廷尉逮詔鄉里識之者張宗禄等則人識之者多矣不應如此差舛然若以紀傳不相照誤立兩姓名則不疑傳末又云一姓張名延年則是當時廷尉驗問之時一人已有兩姓名矣則是非未可定也故史家於此微見其意初不疑縳送詔獄之時已自云衞太子得罪先帝亡不即死今來自詣此罪人也天子與大將軍聞而嘉之史著此語亦欲後人推原其意耳漢時送葬之禮極厚武帝之葬昭帝幼弱霍光不學取金錢財物鳥獸魚鼈牛馬虎豹生禽凡百九十物盡瘞藏之又以後宫守園陵於是園妾自此始矣後世因之遂不復變白樂天有園陵妾詩讀者傷之今之闕角謂之觚稜蓋取其有四稜也僕友柴愼微云觚酒噐也可容二升腹與足皆有四稜漢宫闕取其制以為角隅安獸處也故曰上觚稜而棲金爵爵觚皆酒噐名其腹之四稜削之可以為圎故漢書曰破觚為圜南方朱鳥蓋未為鶉首午為鶉火已為鶉尾天道左旋二十八宿右轉而朱鳥之首在西故先曰未次曰午卒曰已也然南方七宿之中四宿為朱鳥之象漢天文志柳為鳥咮星為鳥頸張為鳥啄翼為鳥翼或問朱鳥而獨取於鶉何也僕對曰朱鳥之象止於翼宿而不言尾有似於鶉故以名之然謂之鶉尾者嘗問元城先生先生曰葢以翼為尾云故甘氏星經云鳥之鬪竦其尾鶉之鬪竦其翼以此知之柴愼微言春秋載二百四十二年之事其為簡册無幾耳故多從省文後世妄行穿鑿故其說不勝繁蕪且如成十四年秋叔孫僑如如齊逆女九月僑如以夫人婦姜氏至自齊左氏曰稱族尊君命也舎族尊夫人也殊不知乃經之省文也經中若此書者多矣成十八年公孫歸父如晉歸父還自晉至笙遂奔齊昭十三年晉人執季孫意如以歸十四年意如至自晉二十三年晉人執我行人叔孫舎二十四年叔孫舎至自晉皆省文也譬之水性本清塵泥汨之則濁也若復去之則水性明矣今讀春秋者但不為諸家所汨則聖人之意見矣古人重譜系故雖世胄綿逺可以考䆒淵明命子詩云天集有漢眷于愍侯赫赫愍侯運當攀龍撫劒風邁顯兹武功泰誓山河啓土開封今按漢書高帝功臣表開封愍侯陶舎以左司馬從漢破代封侯昔髙帝與功臣盟云使黄河如帶泰山若礪國以永存爰及苖裔所謂泰誓山河謂此盟也髙帝功臣百有二十人舎其一也又云亹亹丞相允廸前從渾渾長源鬱鬱洪河群川載導衆條載羅時有語黙運同隆窊此蓋謂陶青也今按漢髙帝功臣表開封愍侯陶舎封十一年薨十二年夷侯青嗣四十八年薨漢百官表孝景二年六月丞相嘉薨八月癸未御史大夫陶青為丞相七年六月乙巳丞相青免太尉周亞夫為丞相所謂群川衆條以喻枝泒之分散也語黙隆窊以言自陶青後未有顯者也淵明乃長沙公之曾孫然侃傳不載世家獨於此見之後世累經亂離譜籍散亡然又士大夫因循㓕裂不如古人所以家譜不傳於世惜哉亳州祁家極收本朝前輩書帖僕嘗見其家所收孫宣公奭書尺有云行李鼎來蓋古之行李乃今之行使也魯僖公之三十年燭之武見秦伯曰若舎鄭以為東道主行李之往來共其困乏注云行李使人也魯襄公之八年鄭及楚平晉責曰君有楚命亦不使一箇行李告於寡君注云一箇獨使也行李行人也然古之李字從山下人人下子作􅡛後人乃轉作李也一箇行李謂一介行使今人以行李為隨行之物失之遠矣司馬温公祖塋在陜府夏縣之西二十四里地名鳴條山有墳寺曰餘慶山下即温公之祖居也僕為夏縣令日屢至其處及十許里有涑水故温公號涑水先生鳴條山即湯與桀戰之地去解州安邑縣五十里乃桀之都也吕相絶秦書曰伐我涑川俘我王官以此見秦晉兩國境上二邑也涑川即洓水也王官屬今河中府虞鄉縣唐末司空表聖隠於王官谷有天柱峯休休亭乃一絶境也韓退之三上宰相書但著月日而無年今按李漢云公生於大厯戊申而退之書云今有生人二十八年矣大厯三年戊申至貞元十一年乙亥退之時年二十八以宰相年表考之是年宰相乃賈耽盧邁趙憬也但不知退之所上為何人耳且以前鄉貢進士上書而文格大與當時不同非賢相不能舉也豈耽輩所能識哉今之士人簡尺中或以解茩字易邂逅字非也離騷經云製芰荷以為衣兮王逸注云芰蓤也秦人作薢茩薢音皆茩音茍僕仕於關陜之間不聞此呼正恐王逸別有義爾後又讀爾雅薢茩芵茪注云芵明也或云蓤也關西謂之薢茩以僕所見芵茪者即今之草芵明也其葉初出可以為茹其子可以治目疾蓋謂可以解去垢穢或恐以此得名又爾雅云蓤厥􅀈注云蓤也今水中芰然則蓤自有正名不謂之薢茩明矣或曰然則王逸郭璞皆誤乎僕曰古者信以傳信疑以傳疑郭璞多引用離騷注故承王逸之疑而多出此注所以廣異聞也學者幸再考之夜夣神官與我言羅縷道妙角與根提携陬維口瀾翻百二十刻須㬰間右退之記夣詩殊為難解僕嘗考之此乃言二十八宿之分野也爾雅曰夀星角亢也注云數起高亢列宿之長又曰天根氐也注云下繫於氐若木之有根娵訾之口營室東壁也注云營室東壁星四方似口故以名之所謂百二十刻者蓋渾天儀之法二十八宿從右逆行經十二辰之舎次毎辰十二刻故云百二十刻所謂壯非少者哦七言六字常語一字難者只上所謂哦字也退之欲神其字故隠其語元城先生與僕論十五國風次序僕曰王黍離在􅆁􅅠衞之後且天子可在諸侯後乎先生曰非諸侯也蓋存二代之後也周既㓕商分其畿内為三國即􅆁􅅠衞是也自紂城以北謂之􅆁南謂之􅅠東謂之衞故􅆁以封紂子武庚也􅅠管叔尹之衞蔡叔尹之以監商民謂之三監武王崩三監畔周公誅之盡以其地封康叔故􅆁詩十九篇􅅠詩十篇共二十九篇皆衞詩也序詩者以其地本商之畿内故在於王黍離上且列為三國而獨不謂之衞其意深矣以毛鄭不出此意故備載之鄱陽湖水連南康軍江一帶至冬湖水落魚盡入深潭中土人集船數百艘以竹竿攪潭中以金皷振動之候魚驚出即入大網中多不能脫惟大赤鯉魚最能躍出至髙丈餘後入他網中則不能復躍矣蓋不能三躍也故禹門化龍者是大赤鯉魚他魚不能也杜子羙觀打魚􅁔云綿州江水之東津魴魚潑潑色如銀魚人溠溠沉大網載江一擁數百鱗衆魚常材盡却棄赤魚騰出如有神僕親見捕魚故知此詩之工亳州士人祁家多收本朝前輩書帖内有李西臺所書小詞中羅敷作羅紂初亦疑之後讀漢書昌邑王賀妻十六人生十一人男十一人女其妻中一人嚴羅紂紂音敷乃執金吾嚴延年長孫之女羅紂生女曰持轡乃十一中一人也蓋採桑女之名偶同耳自古中國與邉方戰多用弩晁錯上䟽曰勁弩長㦸射䟽及遠則匈奴之弓弗能格也遊弩往來什伍俱前則匈奴之兵弗能當也平城之歌曰不能控弩李陵以連弩射單于馬隆用弩陣取凉州蓋中國各用所長夫騎射契丹所長也弩車中國所長也蓋車能作陣而騎不可突弩能遠而入深可以勝弓且得其矢而契丹不可用近世獨不用弩當講求之孝經序云魯史春秋學開五傳韓退之云春秋五傳束髙閣然今獨有三家今按前漢藝文志序云春秋分為五注云左氏公羊氏糓梁氏鄒氏夾氏而鄒氏夾氏有録無書乃知二氏特有名爾然王陽傳稱能為騶氏春秋何也豈非至後漢之初此書亦亡乎故曰有録無書前漢鄒騶同音通用韓退之列傳云從愈遊者若孟郊張籍亦皆有名於時以僕觀之郊籍非輩行也東野乃退之朋友張籍乃退之為汴宋觀察推官日所解進士也而李翺皇甫湜則從退之學問者也故詩云東野窺禹穴李翺觀濤江又云東野動驚俗天葩吐竒芬張籍學古淡軒昻避雞群故於東野則稱字而於群弟子則稱名若孔子稱蘧伯玉子産回也由也之類而唐史乃使東野與群弟子同附於退之傳之後而世人不知遂皆稱為韓門弟子誤矣老杜贈李潮八分歌云秦有李斯漢蔡邕中間作者寂不聞嶧山之碑野火燒棗木傳刻肥失真苦縣光和尚骨立書貴瘦硬方通神嶧山之碑至於苦縣光和人多未詳王内翰亦不解謹按老子苦人也今為亳州衞真縣縣有明道宫宫中有漢光和年中所立碑蔡邕所書僕大觀中為永城主簿日縁檄到縣得見之字畫勁㧞真竒筆也且杜工部時已非嶧山真筆况於今乎然今所傳摹本亦自竒絶想見真刻竒偉哉涑水先生一私印曰程伯休甫之後蓋出於司馬遷傳曰重黎世序天地其在周程伯休甫其後也當宣王時官失其守而為司馬氏故洓水引用之耳伯休甫者其字也古字一字多矣如袁絲房喬顔籀之類三字無之獨本朝有劉伯貢父劉中原父或云二人本字貢甫原甫以犯髙魯王諱故去甫而加伯中時人因併三字呼之此說非也六一先生作原甫墓誌云公諱敞字中原父姓劉氏熈寧元年四月八日卒以此可知彼但見錢穆甫以避諱人或呼為錢穆或呼為穆四遂併二劉失之誤矣曹成王碑句法嚴古不可猝解今取其尤者箋之大選江州群能著直畧反職王親教之摶徒官反力勾卒嬴越之法曹誅五畀必利反今釋於此著職者各安守其職也摶力者結集其力也勾卒者伍相勾連也嬴越之法嬴當為嬴謂秦商君越勾踐教兵之法曹誅五畀者曹朋曹也若有罪則凡與之為朋曹者咸誅之五什伍也凡有所獲則分而畀其什伍之兵也蓋利害相及則戰不敢潰而居不敢盗此乃勾卒嬴越之法或曰嬴謂衰嬴也越謂超越也凡戰罰其衰嬴賞其超越也然無勾卒之義當從前說日臨公館靜畫滿地圖雄劒閣星橋北松州雪嶺東華夷山不斷吳蜀水相通興與烟霞會清罇幸不空右杜工部嚴公㕔詠蜀道畫圖是時武䟦扈微有割據之意故公於詩諷之云山不斷水相通以言蜀道不可割據也幕下有益於東道者如此魯臧武仲名紇孔子之父鄹人紇乃叔梁紇也皆音恨發反而世人多呼為核有一小說唐蕭頴士輕薄有同人誤呼武仲名因曰汝紇字也不識或以為瞎字也不識誤矣亳州永城縣之七十里有芒碭山山有巖曰紫氣此蓋髙帝避難所也復有梁孝王墓僕嘗與宿州知録邵渡同遊入隧道中百餘歩至皇堂如五間七架屋許大周迴有石門子十許上鐫作内臣宫女狀中有大石柱四所以懸棺棺不復見矣入時必用油圏以為燭其中盛夏極凉如暮秋時山下有居民數百家今謂之保安鎮蓋當時守塜之遺種也土人呼墓為梁王避暑宫故老云前數年時有人入其中常得黃金而出今不復有矣孝王傳云未死財以鉅萬計不可勝數及死府藏餘黄金尚四十餘輿他財物稱是想見當時送葬之物厚矣魏武帝置發塜中郎摸金校尉如此塜蓋無不發者然古人作事竒偉可驚非後世比也嬾真子卷四
