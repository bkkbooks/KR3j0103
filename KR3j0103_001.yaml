  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0103_WYG_001-1a, image: WYG0863/WYG0863-0403a.png}
body:
  text: 懶真子卷一宋馬永卿撰溫公之任崇福春夏多在洛秋冬在夏縣每日與本縣從學者十許人講書用一大竹筒筒中貯竹簽上書學生姓名講後一日即抽簽令講講不通則公微數責之公每五日作一暖講一杯一飯一麵一肉一菜而已溫公先壠在鳴條山墳所有餘慶寺公一日省墳止寺中有父老五六輩上謁云欲獻薄禮乃用瓦盆盛粟米飯瓦罐盛菜羹真飯土簋啜土鉶也公享之如太牢既畢復前啓曰某等聞端明在縣日為諸生講書村人不及往聽今幸略説公即取紙筆書庶人章講之既已復前白曰自天子章以下各有毛詩兩句此獨無有何也公默然少許謝曰某平生慮不及此當思其所以奉答村父笑而去每見人曰我講書曽難倒司馬端明公聞之不介意廬州東林寺有畫須菩提像如人許大梵相竒古筆法簡易真竒畫也題曰戊辰歲樵人王翰作此乃本朝開寶四年畫也南唐自顯德五年用中原正朔然南唐士大夫以為恥故江南寺觀中碑多不題年號後但書甲子而已後戊辰七年歲次乙亥遂收江南僕友人陳師黯子直嘗謂僕云漢諸儒所傳六經與今所行六經不同互有得失不可以偏辭論也王嘉奏封事曰臣聞咎繇戒帝舜曰亡敖佚欲有國兢兢業業一日二日萬幾師古曰虞書咎繇謨之辭也言有國之人不可敖慢佚欲但當戒慎危懼以理萬事之幾也敖音傲今尚書乃作無教逸欲有邦恐敖字轉寫作教字耳若謂天子教諸侯逸欲恐非是也僕曰書序科斗書廢已久時人無能知者為隸古更定以竹簡寫之所寫訛或有此理自唐以來呼太常卿為樂卿或云太常禮樂之司故有此名然不呼為禮卿何也然此二字古有之前漢食貨志武帝置賞官名曰武功爵第八級曰樂卿故後之文人因取二字用之亦自無害耳元城先生有言魏徵傳稱帝仆所為碑停叔玉昏顧其家衰矣此言非也鄭公之德國史可傳何賴於碑而停叔玉昏乃天以佑魏氏也且房杜何如人也以子尚主遂敗其家僕後考魏氏之譜鄭公四子叔玉叔瑜叔琬叔圭而叔瑜生華華生商商生明明生馮馮生謨至此五世矣使其家尚主而其禍或若房杜豈有再振之理故先生曰停叔玉昏乃天以佑魏氏也信哉杜牧傳稱牧仕宦不合意而從兄悰位將相怏怏不平卒年五十僕以杜氏家譜考之襄陽杜氏出自當陽侯預而佑蓋其後也佑生三子師損式方從郁師損三子詮愈羔式方五子憚憓悰恂怕從郁二子牧顓羣從中悰官最高而牧名最著豈以富貴聲名不可兼乎杜氏凡五房一京兆杜氏二杜陵杜氏三襄陽杜氏四洹水杜氏五濮陽杜氏而杜甫一𣲖不在五𣲖之中豈以其仕官不逹而諸杜不通譜系乎何家譜之見遺也唐史稱杜不通襄州襄陽人晉征南將軍預逺裔審言生間間生甫由此言之則甫佑同出於預而家譜不載未詳陜府平陸主簿張貽孫子訓嘗問僕魚袋制度僕曰今之魚袋乃古之魚符也必以魚者蓋分左右可以合符而唐人用袋盛此魚今人乃以魚為袋之飾非古制也唐車服志曰隨身魚符左一右一左者進內右者隨身皆盛以袋三品以上飾以金五品以上飾以銀景雲中詔衣紫者以金飾之衣緋者以銀飾之謂之章服蓋有據也天道逺矣漢再受天命其兆見於孝景程姬之事然長沙定王發凡十有五子並載於王子諸侯年表元光六年七月乙巳受封者四人元朔四年三月乙丑受封者六人元朔五年三月癸丑受封者一人其年六月壬子受封者四人內舂陵侯買乃其一也而舂陵侯者乃光武之祖也舂陵節侯買卒戴侯熊渠嗣卒孝侯仁嗣卒侯敞嗣建武二年立敞子祉為城陽王蓋以祉者舂陵之正統也故光武立為王然則國之興廢豈偶然哉僕以光武出於舂陵買之後而長沙定王發本傳中不載其詳因備載之張子訓嘗問僕曰蒙恬造筆然則古無筆乎僕曰非也古非無筆但用兔毛自恬始耳爾雅曰不律謂之筆史載筆詩云貽我彤管夫子絶筆獲麟莊子云舐筆和墨是知其來逺矣但古筆多以竹如今木匠所用木斗竹筆故其字從竹又或以毛但能染墨成字即謂之筆至蒙恬乃以兔毛故毛頴傳備載之田敬仲田稚孟田湣田須無田無宇田開田乞田常五世之後並為正卿謂田無宇也八世之後莫之與京謂田常也自齊桓公十四年陳公子完來奔歲在己酉至簡公四年田常弒其君凡一百九十二年其事始驗史記但云舊敬仲完世家不謂之齊不與其篡也與莊子胠篋篇同義元城先生嘗言古之史出於一人之手故寓意深逺且如前漢書每同列傳者亦各有意楊王孫武帝時人胡建昭帝時人朱雲元帝時人梅福成帝時人云敞平帝時人為一列傳蓋五人者皆不得其中然其用意則皆可取王孫裸葬雖非聖人之道然其意在於矯厚葬也胡建為軍正丞不上請而擅斬御史然其意在於明軍法也朱雲以區區口舌斬師傅然其意在於去佞臣也梅福以踈逺小臣而言及於骨肉權臣之間然其意在於尊王室也云敞犯死救師雖非中道然忠義所激耳稍近其中故敘傳云王孫裸葬建乃斬將雲廷訐禹福逾注云逺也刺鳯是謂狂狷敞近其衷注云中也言此五人皆狂狷不得中道獨敞近於中耳此其所以為一列傳世言五角六張此古語也嘗記開元中有人獻俳文於明皇其略云説甚三皇五帝不如來告三郎既是千年一遇且莫五角六張三郎謂明皇也明皇兄弟六人一人早亡故明皇為太子時號五王宅寧王薛王明皇兄也申王岐王明皇弟也故謂之三郎五角六張謂五日遇角宿六日遇張宿此兩日作事多不成然一年之中不過三四日紹興癸丑歲只三日四月五日角七月二十六日張十月二十五日角多不過四日他皆倣此王禹玉年二十許就揚州秋解試瑚璉賦官韻端木賜為宗廟之器滿場中多第二韻用木字云唯彼聖人粵有端木而禹玉獨於第六韻用之上睎顏氏願為可鑄之金下笑宰豫恥作不雕之木則其竒巧亦異矣哉世所傳五栁集數本不同謹按淵明乙丑生至乙巳歲賦歸去來是時四十一矣今遊斜川詩或云辛丑歲則方三十七歲或云辛酉歲則已五十七而詩云開歲倐五十皆非也若云開歲倐五日則正序所謂正月五日言開歲倐忽五日耳近得廬山東林舊本作五日宜以為正又舊氣和天象澄作此象訛耳集中如此類極多今特舉此一篇詩書之序舊同在一處不與本篇相連如堯典舜典以下關雎葛覃以下並一簡牘而書之至孔安國乃移之故曰書序序所以作者之意昭然易見宜相附近故引之各冠其篇首後毛公為詩傳亦復如是故逸書逸詩之名可以見者緣與今所存之序同此一處故也若各冠其篇者則亡之矣蓋其餘則簡編衆多故或逸之今之逸書逸詩是也成湯既沒太甲元年注云太甲太丁之子湯之孫也太丁未立而卒及湯沒而太甲立稱元年惟元祀十有二月乙丑伊尹祠於先王注云成湯崩踰月太甲即位奠殯而告據此文意則成湯之後中間别無君也然孟子云湯崩太丁未立外丙二年仲壬四年太甲顛覆湯之典刑伊尹放之於桐據此則中間又有兩君矣史記湯崩太丁未立而卒於是乃立太丁之弟外丙是為帝外丙外丙即位二年崩立外丙之弟仲壬是為帝仲壬帝仲壬即位四年崩伊尹乃立太丁之子太甲太甲成湯適長孫也以此考之然則書所謂成湯既沒太甲元年者蓋為伊尹欲明言成湯之德以訓嗣王故須先言成湯既沒非謂中間無二君也而注誤認此語遂失之當以孟子史記為正五栁與殷晉安别詩舊本十韻第九韻云才華不隱世江湖多賤貧第十韻云脫有經過便念來存故人今世有本無第十韻故東坡詩送張中亦止於貧字云不救歸裝貧又今本云遊好非久長一遇盡因勤而舊本云遊好非少長一遇定因勤蓋其意云吾與子非少時長時遊從也但今一相遇故定交耳此語最妙識者自知之唐祕書省吏凡六十七人典書四人楷書十人令史四人書令史九人亭長六人掌故八人熟紙匠十人裝潢匠六人筆匠六人且世但知鄉村之吏謂之亭長殊不知唐諸司多有之尚書省志云以亭長啓閉傳禁約則知三省亦有也然裝潢恐是今之表背匠然謂之潢其義未詳元祐中東坡知貢舉日並行詩賦經義書題中出而難任人蠻夷率服注云任佞也難者拒之使不得進也難任人則忠信昭而四夷服東坡習大科日曽作忠信昭而四夷服論而新經與注意同當時舉子謂東坡故與金陵異説以為難於任人則得賢者故四夷服及東坡見説怒曰舉子至不識字輒以難去聲為難平聲盡黜之惟作難去聲字者皆得蓋東坡原不曽見新經而舉子未嘗讀注故也聞之於柴慎微古今之事有可資一笑者太公八十遇文王世所知也然宋玉楚詞云太公九十乃顯榮兮誠未遇其匡合東方朔云太公體行仁義七十有二乃設用於文武噫太公老矣方得東方朔減了八歲却被宋玉展了十歲此事真可絶倒古人吟詩絶不草草至於命題各有深意老杜獨酌詩云步屧深林晚開樽獨酌遲仰蜂粘落絮行蟻上枯梨徐步詩云整履步青蕪荒庭日欲晡芹泥隨燕嘴花蕊上蜂鬚且獨酌則無獻酬也徐步則非奔走也以故蜂蟻之類微細之物皆能見之若夫與客對談急趨而過則何睱視詳至於是哉僕嘗以此理問僕舅氏舅氏曰東山之詩蓋嘗言之伊威在室蠨蛸在户町畽鹿場熠耀宵行此物尋常亦有之但人獨居間時乃見之耳杜詩之源出於此吳興老釋子野雪蓋精廬詩名徒自振道心常晏如想子棲禪夜見月東峯初清磬落巖谷焚香滿空虛夙慕端成舊未識豈為疏願以碧雲思方君怨别餘茂苑繁華地流水野僧居何當一遊詠倚閣吟躊蹰右蘇州招晝公詩晝公即皎然也居於湖舊説皎然欲見韋蘇州恐詩體不合遂作古詩投之蘇州一見大不滿意繼而皎然復獻舊詩蘇州大稱賞曰幾誤失大名何不止以所長見示而輒希老夫之意且蘇州詩格如此高古而皎然卒然效之宜乎不逮也士欲迎合者以此少戒同州澄城縣有九龍廟然只一妃耳土人云馮瀛王之女也夏縣司馬才仲戲題詩云身既事十主女亦妃九龍過客讀之無不一笑才仲名棫兄才叔名槱皆溫公之姪孫豪傑之士咸未四十而卒文季每言及之必慘然也聖人之言何其逺哉雖弟子皆可與聞而又擇其中尤可與言者言之仲尼之弟子皆孝也而曽子為上首故孔子與之言孝經佛之弟子皆解空也而須菩提為上首故佛與之言金剛經餘弟子不與也楚辭山鬼曰若有人兮山之阿被薜荔兮帶女蘿既含睇兮又宜笑子慕豫兮善窈窕僕讀至此始悟莊子之言曰西施捧心而嚬鄰人效之皆棄而走且美人之容或笑或嚬無不佳者如屈子以笑為宜而莊子以嚬為美也若醜人則嚬固增醜狀而笑亦不宜矣屈莊皆方外人而言世間事曲盡其妙然亦不害為道人也襄鄧之間多隱君子僕為淅川令日與一老士人鄭正字楚老往還楚老之言可取者極多今但記其論天一説楚老之言曰古今言天者多矣皆無所考據獨一説簡易可信列子之言曰終日在天中行止張湛注曰自地以上皆天也此言可信僕初未信其言俄被差為金州考試官行金房道中過外朝雞鳴馬息女媧諸嶺高至十里或二十里然則自下望之豈不在天中行乎後又觀抱朴子言自地以上四十里則乘剛氣而行蓋自此以上愈高愈清則為神靈之所居三光之所縣蓋天積氣耳非若形質而有拘礙但愈高則愈逺耳若曰自地至天凡若干里僕不信也杜工部送重表姪王砯評事詩云秦王時在坐真氣驚户牖又云次問最少年虬鬚十八九然十八九三字乃出於丙吉傳云武帝曽孫在掖庭外家者至今十八九矣其語蓋出於此始信老杜用事若出天成其大略如此今特舉此一篇縣尉呼為少府者古官名也漢百官表云大司農供軍國之用少府則奉養天子名曰禁錢府是别藏少者小也故稱少府以亞大司農也蓋國朝之初縣多惟令尉令既呼明府故尉呼少府以亞於縣令東坡至黃州邀一隱士相見但視傳舍不言而去東坡曰豈非以身世為傳舍相戒乎因贈以詩末云士廉豈識桃椎妙妄意稱量未必然此蓋用朱桃椎故事也高士廉備禮請見與之語不答瞪目而去士亷再拜曰祭酒其使我以無事治蜀耶乃簡條目州遂大治東坡用事之切當如此皆取隱士相見不言之意也今之契丹謂中國為漢者蓋有説也西域傳載武帝輪臺詔曰胸奴縳馬前後足言秦人我丐若馬注謂中國人為秦人習故言也故今契丹謂中國為漢亦由是也鄭吉傳云威振西域并護西北道故號都護中西域而立幕府治烏壘城鎮撫諸國誅伐懷集之漢之號令班西域矣始自張直成於鄭吉僕以西域傳考之烏壘去龜兹國三百五十里而烏壘去陽關二千七百三十八里於西域為中然烏壘户百一十口千二百勝兵三百人而西域五十餘國咸聽指揮蓋漢積威之所致也始信女騫以三五胡人守中國一大郡而人不敢圖者良有以夫沈傳師遊嶽鬱寺詩云承明年老輒自論乞得湘守東南奔蓋用嚴助故事也嚴助為會稽太守數年不聞問賜書曰制詔會稽太守君厭承明之廬勞侍從之事今以傳師傳考之穆宗時召入翰林為學士改中書舍人翰林闕承旨次當傳師穆宗欲面命辭曰學士院長參天子密議次為宰相臣自知必不能願治人一方為陛下長養之因稱疾出遂以本官兼史職俄出為湖南觀察使故傳師於詩以見其志元城先生曰某之北歸與東坡同途兩舟相䘖未嘗一日不相見嘗記東坡自言少年時與其父并弟同讀富鄭公使北語録至於説大遼國主云用兵則士馬物故國家受其害爵賞日加人臣受其利故凡北朝之臣勸用兵者乃自為計非為北朝計也遼主明知利害所在故不用兵三人皆歎其言以為明白而切中事機時老蘇謂二子曰古人有此意否東坡對曰嚴安亦有此意但不如此明白老蘇笑以為然懶真子卷一
